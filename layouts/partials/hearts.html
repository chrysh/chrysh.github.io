<div class="hearts-container" id="hearts-container">
  <button class="hearts-btn" type="button">
    <span class="hearts-icon">❤️</span>
    <span class="hearts-count">...</span>
  </button>
</div>

<style>
.hearts-container {
  margin-top: 1.5em;
  padding-top: 1em;
  border-top: 1px solid #eee;
}
.hearts-btn {
  background: none;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 1.1em;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s ease;
}
.hearts-btn:hover:not(:disabled) {
  border-color: #e0245e;
  background: #fef0f5;
}
.hearts-btn:disabled {
  cursor: default;
  opacity: 0.8;
}
.hearts-icon {
  font-size: 1.2em;
}
</style>

<script>
(function() {
  const API_HOST = 'https://api.countapi.xyz';
  const NAMESPACE = 'blog-hearts';
  
  function getPostKey() {
    var path = window.location.pathname;
    return path.replace(/[\/]+$/, '').replace(/[\/]/g, '-') || 'home';
  }
  
  function init() {
    var container = document.getElementById('hearts-container');
    if (!container) return;
    
    var key = NAMESPACE + '-' + getPostKey();
    var btn = container.querySelector('.hearts-btn');
    var countEl = container.querySelector('.hearts-count');
    
    fetch(API_HOST + '/' + key)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        countEl.textContent = data.count;
      })
      .catch(function() {
        countEl.textContent = '0';
      });
    
    if (localStorage.getItem('hearts-reacted-' + key)) {
      btn.disabled = true;
    }
    
    btn.addEventListener('click', function() {
      if (localStorage.getItem('hearts-reacted-' + key)) return;
      
      fetch(API_HOST + '/hit/' + key, { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          countEl.textContent = data.count;
          localStorage.setItem('hearts-reacted-' + key, 'true');
          btn.disabled = true;
        });
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
